<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Calender</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(to right, blue, red, orange);
    }

    .calendar-wrapper {
      text-align: center;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 80px);
      gap: 5px;
      text-align: center;
      height: 300px;
      justify-content: center
    }

    
  </style>
</head>

<body>
  <div class="calendar-wrapper">
    <h2 class="month-year">July 2026</h2>
    <div class="calendar">
      <div class="day off">Sun</div>
      <div class="day on">Mon</div>
      <div class="day on">Tue</div>
      <div class="day on">Wed</div>
      <div class="day on">Thu</div>
      <div class="day on">Fri</div>
      <div class="day off">Sat</div>
      <div class=" box boxx">1</div>
      <div class=" box box2">2</div>
      <div class=" box box3">3</div>
      <div class=" box box4">4</div>
      <div class=" box box5">5</div>
      <div class=" box box6">6</div>
      <div class=" box boxx">7</div>
      <div class=" box boxx">8</div>
      <div class=" box box9">9</div>
      <div class=" box box10">10</div>
      <div class=" box box11">11</div>
      <div class=" box box12">12</div>
      <div class=" box box13">13</div>
      <div class=" box boxx">14</div>
      <div class=" box boxx">15</div>
      <div class=" box box16">16</div>
      <div class=" box box17">17</div>
      <div class=" box box18">18</div>
      <div class=" box box19">19</div>
      <div class=" box box20">20</div>
      <div class=" box boxx">21</div>
      <div class=" box boxx">22</div>
      <div class=" box box23">23</div>
      <div class=" box box24">24</div>
      <div class=" box box25">25</div>
      <div class=" box box26">26</div>
      <div class=" box box27">27</div>
      <div class=" box boxx">28</div>
      <div class=" box boxx">29</div>
      <div class=" box box30">30</div>

    </div>
  </div>

</body>

</html>
