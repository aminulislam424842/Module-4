<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Grid</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="card">
      <img src="image/Acer Aspire 5.webp" alt="Laptop">
      <h3>Acer Aspire 5</h3>
      <p class="price">৳75000</p>
      <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card">
      <img src="image/Adidas Ultraboost 23.webp" alt="Shoes">
      <h3>Adidas Ultraboost</h3>
      <p class="price">৳2400</p>
      <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card">
      <img src="image/Apple AirPods Pro (2nd Generation).webp" alt="Airpods">
      <h3>Airpods</h3>
      <p class="price">৳5500</p>
      <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card">
      <img src="image/iPhone 16 Pro Max.png" alt="Phone">
      <h3>iphone 16 pro max</h3>
      <p class="price">৳165000</p>
      <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card">
      <img src="image/Long Sleeve Basic T-Shirt.jpg" alt="T-Shirt">
      <h3>T-Shirt</h3>
      <p class="price">৳1500</p>
      <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card">
      <img src="image/Acer Nitro VG240Y.jfif" alt="Monitor">
      <h3>Acer Nitro VG240Y</h3>
      <p class="price">৳14000</p>
      <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card">
      <img src="image/Atomic Habits.png" alt="Book">
      <h3>Atomic Habits</h3>
      <p class="price">৳600</p>
      <button class="buy-btn">Buy Now</button>
    </div>
    <div class="card">
      <img src="image/Philips SmartSleep Sleep & Wake-Up Light.webp" alt="SmartSleep">
      <h3>SmartSleep</h3>
      <p class="price">৳3500</p>
      <button class="buy-btn">Buy Now</button>
    </div>
  </div>
</body>

</html>
