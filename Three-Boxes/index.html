<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Box</title>
  <style>
    .container{
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 300px;
    }
    .Box1{
      color: white;
      background-color: blue;
      padding: 40px;
      border-radius: 10px;
    }
    .Box2{
      color: white;
      background-color: rgba(10, 163, 23, 0.747);
      padding: 40px;
      border-radius: 10px;
    }
    .Box3{
      color: white;
      background-color: rgba(221, 104, 9, 0.747);
      padding: 40px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="Box1">Box 1</p>
    <p class="Box2">Box 2</p>
    <p class="Box3">Box 3</p>
  </div>
</body>
</html>
