<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2 class="month-year">July 2026</h2>

  <div class="calendar">
    <div class="day off">Sun</div>
    <div class="day on">Mon</div>
    <div class="day on">Tue</div>
    <div class="day on">Wed</div>
    <div class="day on">Thu</div>
    <div class="day on">Fri</div>
    <div class="day off">Sat</div>
  </div>

  <div class="calendar">
    <div class="date-cell sunday">1</div>
    <div class="date-cell">2</div>
    <div class="date-cell">3</div>
    <div class="date-cell event-meeting">
      4
      <span class="event-label">Meeting</span>
    </div>
    <div class="date-cell">5</div>
    <div class="date-cell">6</div>
    <div class="date-cell sunday">7</div>

    <div class="date-cell sunday">8</div>
    <div class="date-cell">9</div>
    <div class="date-cell event-exam">
      10
      <span class="event-label">Exam</span>
    </div>
    <div class="date-cell">11</div>
    <div class="date-cell">12</div>
    <div class="date-cell">13</div>
    <div class="date-cell sunday">14</div>

    <div class="date-cell sunday">15</div>
    <div class="date-cell">16</div>
    <div class="date-cell">17</div>
    <div class="date-cell event-holiday">
      18
      <span class="event-label">Holiday</span>
    </div>
    <div class="date-cell">19</div>
    <div class="date-cell">20</div>
    <div class="date-cell sunday">21</div>

    <div class="date-cell sunday">22</div>
    <div class="date-cell">23</div>
    <div class="date-cell">24</div>
    <div class="date-cell">25</div>
    <div class="date-cell">26</div>
    <div class="date-cell">27</div>
    <div class="date-cell sunday">28</div>

    <div class="date-cell sunday">29</div>
    <div class="date-cell">30</div>
    <div class="date-cell">31</div>
  </div>

</body>
</html>
